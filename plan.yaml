# Dashboard Implementation Plan
# Generated by dashboard-planner agent
# Working Parents Tax Relief Act of 2026 Dashboard
# Modeled after: https://github.com/PolicyEngine/keep-your-pay-act

dashboard:
  name: "working-parents-tax-relief-act"
  title: "Working Parents Tax Relief Act Calculator"
  description: >
    Interactive calculator for estimating the impact of Rep. McDonald Rivet's
    Working Parents Tax Relief Act of 2026. This bill enhances the Earned Income
    Tax Credit (EITC) for parents of young children (under age 4) by increasing
    credit percentages and phaseout percentages. The dashboard provides both
    household-level impact analysis and national microsimulation results.
  country: us
  audience: public

# Data pattern explanation:
# Using hybrid pattern matching keep-your-pay-act:
# - Household tab: Uses PolicyEngine API directly (policyengine-api pattern)
# - National tab: Uses precomputed CSV data (precomputed-csv pattern)
#
# This approach is preferred because:
# 1. Household calculations are fast enough to run live via PE API
# 2. National microsimulation is slow (2-5 min/year) so must be precomputed
# 3. No custom Modal backend needed - the reform is a contributed reform
#    in policyengine-us (PR #7914), so we can use Reform.from_dict()
data_pattern: hybrid-precomputed-api

# Reform specification
reform:
  # This reform is implemented as a contributed reform in policyengine-us
  # PR: https://github.com/PolicyEngine/policyengine-us/pull/7914
  # Path: policyengine_us/reforms/congress/mcdonald_rivet/working_parents_tax_relief_act/
  policyengine_package: policyengine-us
  reform_class: "congress.mcdonald_rivet.working_parents_tax_relief_act"

  # For API calls, we need to specify reform parameters directly
  # The reform toggles on: gov.contrib.congress.mcdonald_rivet.working_parents_tax_relief_act.in_effect
  reform_json:
    gov.contrib.congress.mcdonald_rivet.working_parents_tax_relief_act.in_effect:
      "2026-01-01.2100-12-31": true

  # Bill provisions summary
  provisions:
    - name: "Credit percentage increase (1 child)"
      description: "If child has not attained age 4, increase credit percentage by 42.24 percentage points"
      parameter: "gov.contrib.congress.mcdonald_rivet.working_parents_tax_relief_act.credit_percentage_increase_one_child"
      value: 0.4224

    - name: "Credit percentage increase (2+ children)"
      description: "Increase credit percentage by 30.07 percentage points for each of youngest 3 children under age 4"
      parameter: "gov.contrib.congress.mcdonald_rivet.working_parents_tax_relief_act.credit_percentage_increase_per_young_child"
      value: 0.3007

    - name: "Phaseout percentage increase"
      description: "Increase phaseout percentage by 5 percentage points per young child (max 3)"
      parameter: "gov.contrib.congress.mcdonald_rivet.working_parents_tax_relief_act.phaseout_percentage_increase_per_young_child"
      value: 0.05

    - name: "Young child age threshold"
      description: "Children under age 4 qualify for increased EITC"
      parameter: "gov.contrib.congress.mcdonald_rivet.working_parents_tax_relief_act.young_child_age_threshold"
      value: 4

    - name: "Max young children"
      description: "Maximum 3 young children count toward bonus"
      parameter: "gov.contrib.congress.mcdonald_rivet.working_parents_tax_relief_act.max_young_children"
      value: 3

  effective_date: "2026-01-01"

# API integration for household calculator
api_integration:
  endpoint: "https://api.policyengine.org/us/calculate"
  method: POST
  variables_requested:
    - household_net_income
    - employment_income
    - eitc
    - eitc_maximum
    - adjusted_gross_income

  # Household situation builder mirrors keep-your-pay-act pattern
  household_builder:
    entities:
      - person: [age, employment_income]
      - tax_unit: [adjusted_gross_income]
      - household: [state_code, household_net_income]
    axes:
      - variable: employment_income
        min: 0
        max: 500000  # configurable
        count: 501   # scaled based on max

# Precomputed data for national impact tab
precomputed:
  source_script: "scripts/pipeline.py"
  worker_script: "scripts/_pipeline_worker.py"
  output_directory: "frontend/public/data/"
  output_files:
    - "distributional_impact.csv"
    - "metrics.csv"
    - "winners_losers.csv"
    - "income_brackets.csv"
  years: [2026, 2027, 2028, 2029, 2030, 2031, 2032, 2033, 2034, 2035]

  # Microsimulation module
  microsimulation:
    module: "wptra_calc/microsimulation.py"
    function: "calculate_aggregate_impact"
    variables_calculated:
      - income_tax
      - eitc
      - household_net_income
      - household_income_decile
      - in_poverty
      - in_deep_poverty
      - age
      - adjusted_gross_income

tech_stack:
  # Fixed - matches keep-your-pay-act exactly
  framework: react-nextjs
  nextjs_version: "14.x"
  ui: tailwind-css
  styling: tailwind-with-design-tokens
  font: inter
  testing: vitest
  charts: recharts
  state_management: react-query
  package_manager: npm  # or bun

# Three-tab structure matching keep-your-pay-act
tabs:
  - id: policy
    label: "Policy overview"
    description: "Explanation of the Working Parents Tax Relief Act provisions"

  - id: impact
    label: "Household impact"
    description: "Personal impact calculator"

  - id: aggregate
    label: "National impact"
    description: "Microsimulation results across the US population"

components:
  # ===== TAB 1: POLICY OVERVIEW =====
  - type: info_card
    id: policy-summary
    tab: policy
    title: "Working Parents Tax Relief Act"
    description: >
      The Working Parents Tax Relief Act of 2026, introduced by Rep. McDonald Rivet,
      enhances the Earned Income Tax Credit (EITC) for parents of young children
      (under age 4).

  - type: info_card_grid
    id: provisions-grid
    tab: policy
    columns: 2
    cards:
      - title: "Credit percentage boost (1 child)"
        description: >
          If a qualifying child has not attained age 4, the credit percentage
          increases by 42.24 percentage points (from 34% to 76.24%).

      - title: "Credit percentage boost (2+ children)"
        description: >
          For families with 2+ children, increase credit percentage by 30.07
          percentage points for each of the youngest 3 qualifying children
          under age 4.

      - title: "Phaseout percentage increase"
        description: >
          The phaseout percentage increases by 5 percentage points for each
          of the youngest 3 qualifying children under age 4 (max +15pp).

      - title: "Monthly payment option"
        description: >
          The increased credit amount may be paid monthly rather than as
          an annual lump sum.

  - type: chart
    id: eitc-comparison-chart
    tab: policy
    chart_type: line
    component_ref: "app-v2:ChartContainer"
    title: "EITC by income: single parent with one child under 4 (2026)"
    description: "Comparison of baseline vs. reform EITC by employment income"
    x:
      variable: employment_income
      label: "Employment income"
      format: currency
      domain: [0, 60000]
    y:
      - variable: eitc_baseline
        label: "Current law"
        color: gray-400
        strokeDasharray: "5 5"
      - variable: eitc_reform
        label: "Working Parents Tax Relief Act"
        color: primary-500
    annotations:
      - type: reference_line
        y: 0
        stroke: gray-400

  - type: table
    id: eitc-parameters-table
    tab: policy
    title: "EITC parameter changes for parents of young children"
    columns:
      - key: scenario
        label: "Scenario"
      - key: baseline_max
        label: "Baseline max"
        format: currency
      - key: reform_max
        label: "Reform max"
        format: currency
      - key: multiplier
        label: "Multiplier"
    rows:
      - scenario: "1 child with young child"
        baseline_max: 4427
        reform_max: 9927
        multiplier: "2.24x"
      - scenario: "2 children with 2 young"
        baseline_max: 7316
        reform_max: 18316
        multiplier: "2.50x"
      - scenario: "3+ children with 3 young"
        baseline_max: 8231
        reform_max: 24736
        multiplier: "3.01x"

  - type: sources
    id: policy-sources
    tab: policy
    links:
      - label: "policyengine-us PR #7914"
        url: "https://github.com/PolicyEngine/policyengine-us/pull/7914"
      - label: "IRC Section 32"
        url: "https://www.law.cornell.edu/uscode/text/26/32"

  # ===== TAB 2: HOUSEHOLD IMPACT =====
  - type: input_form
    id: household-inputs
    tab: impact
    title: "Your household"
    layout: grid
    columns: 3
    fields:
      - name: income
        input_type: currency
        label: "Employment income"
        default: 75000
        min: 0
        max: 1000000

      - name: age_head
        input_type: number
        label: "Your age"
        default: 35
        min: 18
        max: 100

      - name: married
        input_type: checkbox
        label: "Filing status"
        checkbox_label: "Married filing jointly"
        default: false

      - name: age_spouse
        input_type: number
        label: "Spouse age"
        default: 35
        min: 18
        max: 100
        conditional: married

      - name: dependents_count
        input_type: number
        label: "Dependents"
        default: 1
        min: 0
        max: 10

      - name: dependent_ages
        input_type: number_array
        label: "Dependent ages"
        description: "Ages of each dependent (children under 4 qualify for increased EITC)"
        default: [2]
        min_each: 0
        max_each: 26

      - name: state
        input_type: select
        label: "State"
        options: us_states
        default: "CA"

  - type: action_button
    id: calculate-button
    tab: impact
    label: "Calculate impact"
    variant: primary

  - type: metric_card
    id: personal-impact-card
    tab: impact
    title: "Change in net income"
    value_variable: benefit_at_income.difference
    format: currency_with_sign
    conditional: triggered
    color_logic:
      positive: success
      negative: error
      zero: gray

  - type: chart
    id: income-impact-chart
    tab: impact
    chart_type: line
    component_ref: "app-v2:ChartContainer"
    title: "Change in net income by employment income (2026)"
    conditional: triggered
    x:
      variable: income
      label: "Employment income"
      format: currency
    y:
      - variable: benefit
        label: "Change in net income"
        color: primary-500
        strokeWidth: 3
    annotations:
      - type: reference_line
        y: 0
        stroke: gray-600
        strokeWidth: 2

  - type: axis_selector
    id: chart-axis-selector
    tab: impact
    label: "Chart x-axis max"
    options: [200000, 500000, 1000000, 2000000, 5000000, 10000000]
    default: 500000

  # ===== TAB 3: NATIONAL IMPACT =====
  - type: year_selector
    id: year-selector
    tab: aggregate
    years: [2026, 2027, 2028, 2029, 2030, 2031, 2032, 2033, 2034, 2035]
    default: 2026

  - type: section_tabs
    id: aggregate-sections
    tab: aggregate
    sections:
      - key: fiscal
        label: "Budgetary impact"
      - key: distributional
        label: "Distributional impact"
      - key: winners
        label: "Winners & losers"
      - key: poverty
        label: "Poverty impact"

  # Fiscal section
  - type: metric_card_grid
    id: budget-metrics
    tab: aggregate
    section: fiscal
    columns: 2
    cards:
      - title: "Budgetary impact (selected year)"
        value_variable: budget.budgetary_impact
        format: billions
        color_logic:
          positive: success
          negative: error
      - title: "10-year budget window (2026-2035)"
        value_variable: ten_year_total
        format: billions
        color_logic:
          positive: success
          negative: error

  - type: table
    id: income-bracket-table
    tab: aggregate
    section: fiscal
    title: "Impact by income bracket"
    data_source: by_income_bracket
    columns:
      - key: bracket
        label: "Income bracket"
      - key: beneficiaries
        label: "Affected households"
        format: number
      - key: total_cost
        label: "Total impact"
        format: billions
        color_logic: value_sign
      - key: avg_benefit
        label: "Average impact"
        format: currency_with_sign
        color_logic: value_sign

  # Distributional section
  - type: toggle
    id: dist-mode-toggle
    tab: aggregate
    section: distributional
    options:
      - key: relative
        label: "Relative"
      - key: absolute
        label: "Absolute"
    default: relative

  - type: chart
    id: decile-chart
    tab: aggregate
    section: distributional
    chart_type: bar
    component_ref: "app-v2:ChartContainer"
    title: "Impact by income decile"
    description_relative: "Change in household net income as a percentage of baseline income, by decile."
    description_absolute: "Average change in household net income in dollars, by decile."
    x:
      variable: decile
      label: "Income decile"
    y:
      variable: value
      format_relative: percent_with_sign
      format_absolute: currency_with_sign
    color_logic:
      positive: primary-500
      negative: gray-600
    symmetric_domain: true
    reference_line:
      y: 0
      stroke: gray-400

  # Winners & losers section
  - type: metric_card_grid
    id: winners-losers-metrics
    tab: aggregate
    section: winners
    columns: 3
    cards:
      - title: "Winners"
        value_variable: winners_rate
        format: percent
        subtitle_variable: winners
        subtitle_format: "households gain"
        background: success-light
        border_color: primary-500
      - title: "No change"
        value_variable: no_change_rate
        format: percent
        background: gray-50
      - title: "Losers"
        value_variable: losers_rate
        format: percent
        subtitle_variable: losers
        subtitle_format: "households lose"
        background: gray-50

  - type: chart
    id: intra-decile-chart
    tab: aggregate
    section: winners
    chart_type: stacked_bar_horizontal
    component_ref: "app-v2:ChartContainer"
    title: "Winners & losers by income decile"
    stack_offset: expand
    categories:
      - key: gain_more_than_5pct
        label: "Gain more than 5%"
        color: primary-700
      - key: gain_less_than_5pct
        label: "Gain less than 5%"
        color: primary-500-60
      - key: no_change
        label: "No change"
        color: gray-200
      - key: lose_less_than_5pct
        label: "Lose less than 5%"
        color: gray-400
      - key: lose_more_than_5pct
        label: "Lose more than 5%"
        color: gray-600

  # Poverty section
  - type: chart
    id: poverty-chart
    tab: aggregate
    section: poverty
    chart_type: bar
    component_ref: "app-v2:ChartContainer"
    title: "Change in poverty rates (%)"
    data:
      - label: "Overall poverty"
        value_variable: poverty_percent_change
      - label: "Child poverty"
        value_variable: child_poverty_percent_change
      - label: "Deep poverty"
        value_variable: deep_poverty_percent_change
      - label: "Deep child poverty"
        value_variable: deep_child_poverty_percent_change
    color_logic:
      negative_is_good: true  # Poverty reduction is good
      positive: gray-600
      negative: primary-500

  - type: disclaimer
    id: static-disclaimer
    tab: aggregate
    text: >
      These estimates are static: they do not capture behavioral responses
      such as changes in labor supply, tax avoidance, or migration.

embedding:
  register_in_apps_json: true
  display_with_research: true
  slug: "working-parents-tax-relief-act"
  canonical_url: "https://policyengine.org/us/working-parents-tax-relief-act"
  tags: ["us", "policy", "interactives", "eitc", "tax-credits", "congress"]

# File structure (mirrors keep-your-pay-act)
structure:
  root_files:
    - "reform.json"
    - "readme.md"
    - ".gitignore"

  frontend:
    app:
      - "layout.tsx"
      - "globals.css"
      - "robots.ts"
      - "sitemap.ts"
      - "(shell)/layout.tsx"
      - "(shell)/page.tsx"

    components:
      - "Header.tsx"
      - "Footer.tsx"
      - "Providers.tsx"
      - "ChartWatermark.tsx"
      - "PolicyOverview.tsx"
      - "ImpactAnalysis.tsx"
      - "AggregateImpact.tsx"

    hooks:
      - "useHouseholdImpact.ts"
      - "useAggregateImpact.ts"

    lib:
      - "types.ts"
      - "api.ts"
      - "household.ts"
      - "parseCSV.ts"

    public:
      - "data/"  # precomputed CSVs

  wptra_calc:  # Working Parents Tax Relief Act calculation module
    - "__init__.py"
    - "household.py"
    - "microsimulation.py"
    - "reforms.py"

  scripts:
    - "pipeline.py"
    - "_pipeline_worker.py"

tests:
  api_tests:
    - name: "single_parent_young_child_low_income"
      description: "Single parent with 1 child age 2, income $20k gets large EITC boost"
      input:
        age_head: 30
        age_spouse: null
        dependent_ages: [2]
        income: 20000
        year: 2026
        state_code: "CA"
      expected:
        benefit_at_income.difference:
          min: 3000
          max: 6000

    - name: "single_parent_older_child"
      description: "Single parent with 1 child age 10, no reform impact on EITC rates"
      input:
        age_head: 35
        age_spouse: null
        dependent_ages: [10]
        income: 25000
        year: 2026
        state_code: "CA"
      expected:
        benefit_at_income.difference:
          min: -100
          max: 100

    - name: "married_two_young_children"
      description: "Married couple with 2 children ages 1 and 3"
      input:
        age_head: 32
        age_spouse: 30
        dependent_ages: [1, 3]
        income: 30000
        year: 2026
        state_code: "TX"
      expected:
        benefit_at_income.difference:
          min: 5000
          max: 12000

    - name: "three_young_children_max_bonus"
      description: "3+ young children, capped at 3 for bonus calculation"
      input:
        age_head: 35
        age_spouse: 33
        dependent_ages: [0, 1, 2, 3]
        income: 35000
        year: 2026
        state_code: "NY"
      expected:
        benefit_at_income.difference:
          min: 10000
          max: 20000

    - name: "child_exactly_age_4_no_bonus"
      description: "Child exactly age 4 does not qualify (must be under 4)"
      input:
        age_head: 30
        age_spouse: null
        dependent_ages: [4]
        income: 25000
        year: 2026
        state_code: "CA"
      expected:
        benefit_at_income.difference:
          min: -100
          max: 100

    - name: "no_children"
      description: "Childless worker - no impact from this reform"
      input:
        age_head: 45
        age_spouse: null
        dependent_ages: []
        income: 30000
        year: 2026
        state_code: "FL"
      expected:
        benefit_at_income.difference:
          min: -50
          max: 50

  frontend_tests:
    - name: "renders_without_errors"
      description: "All components mount successfully"
    - name: "tab_navigation_works"
      description: "Switching between tabs renders correct content"
    - name: "charts_receive_data"
      description: "Charts render with correct data shape"
    - name: "input_validation"
      description: "Form rejects invalid inputs (negative ages, etc.)"
    - name: "year_selector_updates_data"
      description: "Changing year in national tab fetches correct CSV data"

  design_compliance:
    - name: "uses_design_tokens"
      description: "No hardcoded colors - all use design token references"
    - name: "inter_font"
      description: "Inter font loaded and applied throughout"
    - name: "sentence_case"
      description: "All headings use sentence case"
    - name: "responsive"
      description: "Layout adapts at 768px and 480px breakpoints"
    - name: "matches_kypa_styling"
      description: "Visual appearance matches Keep Your Pay Act dashboard"

  embedding_tests:
    - name: "country_detection"
      description: "Reads country from hash parameter if embedded"
    - name: "hash_sync"
      description: "Input changes update URL hash"
    - name: "share_urls"
      description: "Share URLs point to policyengine.org"

# Development commands
dev_commands:
  frontend:
    install: "cd frontend && npm install"
    dev: "cd frontend && npm run dev"
    build: "cd frontend && npm run build"
    port: 3008

  data_generation:
    all_years: "python scripts/pipeline.py"
    fresh_start: "python scripts/pipeline.py --fresh"
    single_year: "python scripts/_pipeline_worker.py 2026"

  testing:
    frontend: "cd frontend && npm test"
    python: "pytest tests/"
